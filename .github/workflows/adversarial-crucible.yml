name: ADVERSARIAL CRUCIBLE - NIGHTLY AUDIT
on:
  schedule:
      - cron: '0 0 * * *' # Every night at midnight
        workflow_dispatch:

        jobs:
          adversarial_audit:
              runs-on: ubuntu-latest
                  steps:
                        - name: Checkout repository
                                uses: actions/checkout@v3

                                      - name: Set up Python
                                              uses: actions/setup-python@v4
                                                      with:
                                                                python-version: '3.11'

                                                                      - name: Checkout Security-Janitor
                                                                              uses: actions/checkout@v4
                                                                                      with:
                                                                                                repository: TrishulaSoftware/Security-Janitor
                                                                                                          path: Security-Janitor
                                                                                                          
                                                                                                                - name: Install dependencies
                                                                                                                        run: |
                                                                                                                                  pip install gitpython
                                                                                                                                            if [ -f Security-Janitor/requirements.txt ]; then pip install -r Security-Janitor/requirements.txt; fi
                                                                                                                                            
                                                                                                                                                  - name: "CRUCIBLE: Prompt Injection Simulation"
                                                                                                                                                          run: |
                                                                                                                                                                    python Security-Janitor/janitor_core.py --target . --mode audit > audit.log 2>&1
                                                                                                                                                                              if grep -q "TS-005" audit.log; then exit 1; fi
                                                                                                                                                                              
